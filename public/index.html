<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    
    <meta http-Equiv="Cache-Control" Content="public, max-age=3600" />
    
    <link rel="manifest" href="/manifest.json" />
    <title>%WEB_TITLE%</title>

    <style id="expo-reset">
      html, body {
        height: 100%;
      }
      body {
        /* Prevents "pull-to-refresh" gestures on mobile that cause reloads */
        overscroll-behavior-y: contain; 
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>

    <script>
      window.canInstall = false;
      window.deferredPrompt = null;

      window.addEventListener('load', async () => {
        // Skip if in development mode
        if (!document.querySelector('script[src*="index.ts.bundle"]') && !window.location.href.includes('exp.direct')) {

          // PWA Install Logic
          window.handleBeforeInstallPrompt = (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
            window.canInstall = true;
          };

          window.addEventListener('beforeinstallprompt', window.handleBeforeInstallPrompt);

          window.handleInstallClick = async () => {
            if (!window.deferredPrompt) return;
            window.deferredPrompt.prompt();
            const { outcome } = await window.deferredPrompt.userChoice;
            if (outcome === 'accepted') window.canInstall = false;
          };

          // Service Worker Registration
          if ('serviceWorker' in navigator) {
            try {
              // REMOVED: The manual unregister() block that was killing your session on every load.
              const registration = await navigator.serviceWorker.register('./sw.js');
              console.log('Service Worker active with scope:', registration.scope);

              // Check for updates every hour (3600000ms) instead of every 15 mins
              setInterval(() => {
                registration.update();
              }, 3600000);

              // Update logic
              registration.addEventListener('updatefound', () => {
                const installingWorker = registration.installing;
                if (installingWorker) {
                  installingWorker.addEventListener('statechange', () => {
                    if (registration.waiting) {
                      // Signal the worker to skip waiting and activate
                      registration.waiting.postMessage('SKIP_WAITING');
                    }
                  });
                }
              });

              // Inform the user or log when the new worker takes over
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('New version available. Refresh to update.');
              });

            } catch (error) {
              console.error('Service Worker failed to register:', error);
            }
          }
        }
      });
    </script>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
  </body>
</html>
